name: Deploy React Website to Hostinger Subdomain

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 👈 Opts into Node 24 cleanly to silence the runner warning

jobs:
  build-and-deploy:
    name: 🏗️ Build and 🚀 Deploy React App
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4.2.2 # 👈 Updated patch version

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4.1.0 # 👈 Updated patch version
      with:
        node-version: 24 # 👈 Matches the modern runner runtime environment
        cache: 'npm'

    - name: 🛠️ Install dependencies and Build
      run: |
        npm ci
        npm run build

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        local-dir: ./dist/
        port: 21
        protocol: ftp